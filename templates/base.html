<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCV Scraper · Tasas de referencia</title>
  <meta name="description" content="Tracking automático de las tasas de referencia del Banco Central de Venezuela, 6 veces al día." />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230f172a'/%3E%3Ctext x='12' y='16' font-family='Arial' font-size='12' font-weight='700' text-anchor='middle' fill='%23fff'%3E%24%3C/text%3E%3C/svg%3E" />
  <script src="/static/js/app.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-inner">
        <a href="/" class="brand">
          <span class="brand-mark">BCV</span>
          <span>Scraper</span>
        </a>
        <div class="header-spacer"></div>
        <nav class="nav-links" aria-label="Navegación principal">
          <a href="/" class="nav-link {{ 'active' if active == 'dashboard' else '' }}">Dashboard</a>
          <a href="/history" class="nav-link {{ 'active' if active == 'history' else '' }}">Historial</a>
        </nav>
        <button id="theme-toggle" class="btn-icon" type="button" aria-label="Cambiar tema">
          <span class="theme-icon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
    <footer class="app-footer">
      BCV Scraper · datos de <a href="https://www.bcv.org.ve/" target="_blank" rel="noopener">www.bcv.org.ve</a> · corre 6 veces al día
    </footer>
  </div>
</body>
</html>
